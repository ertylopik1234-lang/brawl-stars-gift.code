<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #0a0c15;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .error-card {
            background: linear-gradient(145deg, #111827 0%, #0f1729 100%);
            border-radius: 48px;
            padding: 48px 32px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 70, 85, 0.3);
        }

        .error-code {
            font-size: 100px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .error-icon {
            font-size: 64px;
            margin: 20px 0;
            display: inline-block;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        h1 {
            color: #ff8a7a;
            font-size: 26px;
            margin: 16px 0;
            font-weight: 700;
        }

        .error-message {
            color: #9ca3af;
            font-size: 16px;
            margin: 16px 0;
            line-height: 1.5;
        }

        .connection-status {
            background: rgba(255, 70, 85, 0.15);
            border-radius: 30px;
            padding: 12px 20px;
            margin: 24px 0;
            display: inline-block;
            border: 1px solid rgba(255, 70, 85, 0.3);
        }

        .connection-status span {
            color: #ff6b6b;
            font-weight: 600;
        }

        .retry-btn {
            background: linear-gradient(95deg, #2a3a5a, #1a2a4a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e6;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: linear-gradient(95deg, #3a4a6a, #2a3a5a);
            transform: translateY(-2px);
        }

        .retry-btn:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #4a5568;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-card">
        <div class="error-code">404</div>
        <div class="error-icon">⚠️🔌</div>
        <h1>СОЕДИНЕНИЕ ПОТЕРЯНО</h1>
        <div class="error-message">
            Сервер временно недоступен.<br>
            Проверьте подключение к интернету и попробуйте позже.
        </div>
        <div class="connection-status">
            🌐 Статус: <span>Offline / Таймаут</span>
        </div>
        <button class="retry-btn" onclick="window.location.reload()">🔄 ПОВТОРИТЬ</button>
    </div>
    <div class="footer">
        Error 504 — Gateway Timeout
    </div>
</div>
</body>
</html>
